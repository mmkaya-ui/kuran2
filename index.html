<!DOCTYPE html>
<html lang="tr" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Kuran okuma, dinleme, arama ve ders programı uygulaması. Türkçe meal, tefsir ve sesli tilavet.">
    <meta name="theme-color" content="#047857">
    <meta name="color-scheme" content="light dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Ders Programı">
    <meta name="format-detection" content="telephone=no">
    <title>Ders Programı ve Notlar</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Ders Programı">
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Apply theme before first paint to prevent FOUC -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (t === 'dark' || (!t && sys)) document.documentElement.classList.add('dark');
            } catch (e) { /* ignore */ }
        })();
    </script>

</head>

<body class="transition-colors duration-300 flex flex-col">

    <!-- ========================================== -->
    <!-- SCHEDULE APP CONTAINER (Vanilla JS)        -->
    <!-- ========================================== -->
    <div id="app-schedule" class="flex flex-col min-h-screen">
        <!-- Templates -->
        <template id="tpl-year-header">
            <div class="flex items-center justify-center my-1 group fade-in select-none">
                <div
                    class="h-px bg-emerald-200/50 dark:bg-emerald-900/30 flex-1 group-hover:bg-emerald-500/30 transition-colors">
                </div>
                <span
                    class="mx-3 text-sm font-bold text-emerald-800/60 dark:text-emerald-400/60 group-hover:text-emerald-700 dark:group-hover:text-emerald-300 transition-colors font-mono tracking-widest uppercase"
                    data-slot="year"></span>
                <div
                    class="h-px bg-emerald-200/50 dark:bg-emerald-900/30 flex-1 group-hover:bg-emerald-500/30 transition-colors">
                </div>
            </div>
        </template>
        <template id="tpl-week-section">
            <section
                class="mb-4 bg-white dark:bg-black dark:border dark:border-neutral-800 rounded-xl shadow-sm overflow-hidden transition-colors duration-300 fade-in group">
                <div class="week-header p-4 flex justify-between items-center border-b border-gray-100 dark:border-neutral-800 hover:bg-emerald-50 dark:hover:bg-gray-700 cursor-pointer select-none active:bg-emerald-100 dark:active:bg-gray-600 transition-colors"
                    role="button" aria-expanded="false">
                    <h2 class="font-bold text-emerald-800 dark:text-emerald-400 flex items-center">
                        <i class="fa-regular fa-calendar-days mr-2 text-emerald-600 dark:text-emerald-400"></i>
                        <span data-slot="week-title"></span>
                    </h2>
                    <i class="fa-solid fa-chevron-down text-gray-400 smooth-transition" data-slot="toggle-icon"></i>
                </div>
                <div class="week-content p-2 bg-gray-50 dark:bg-black hidden transition-colors duration-300"
                    data-slot="content-area"></div>
            </section>
        </template>

        <template id="tpl-card">
            <article
                class="bg-white dark:bg-black dark:border dark:border-neutral-800 p-4 rounded-lg shadow-sm mb-3 border-l-4 border-emerald-500 ml-1 mr-1 mt-1 transition-colors duration-300 hover:shadow-md">
                <div class="flex justify-between items-start mb-3">
                    <div class="pr-2">
                        <div
                            class="text-xs font-bold text-emerald-600 dark:text-emerald-400 uppercase tracking-wide flex items-center gap-2">
                            <span data-slot="date-day"></span>
                            <span data-slot="week-badge"
                                class="hidden text-[10px] bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-1.5 py-0.5 rounded"></span>
                        </div>
                        <h3 class="text-lg font-bold text-gray-800 dark:text-gray-100 leading-tight mt-1"
                            data-slot="subject"></h3>
                        <p class="text-sm text-gray-600 dark:text-gray-400 mt-1 flex items-center">
                            <i class="fa-solid fa-user-tag mr-1 opacity-50 text-xs"></i>
                            <span data-slot="speaker"></span>
                        </p>
                    </div>
                    <div class="flex flex-col items-end gap-1 shrink-0">
                        <time data-slot="time"
                            class="text-xs font-medium bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 px-2 py-1 rounded mb-1"></time>
                        <a href="https://meet.google.com/nmf-ysfs-ohe" data-slot="join-btn" target="_blank"
                            rel="noopener noreferrer"
                            class="text-[10px] text-emerald-700 dark:text-emerald-400 font-bold hover:underline flex items-center bg-emerald-50 dark:bg-emerald-900/20 px-2 py-1 rounded border border-emerald-100 dark:border-emerald-900/30 whitespace-nowrap transition-colors">
                            <i class="fa-solid fa-video text-red-500 mr-1"></i> Katıl
                        </a>
                    </div>
                </div>
                <div class="flex mt-3 pt-3 border-t border-gray-100 dark:border-neutral-800 gap-2" data-slot="actions">
                </div>
            </article>
        </template>

        <template id="tpl-button">
            <a target="_blank" rel="noopener noreferrer"
                class="flex-1 text-center py-2 rounded-md text-sm font-semibold transition duration-200 flex items-center justify-center hover:-translate-y-0.5 shadow-sm hover:shadow-md active:scale-95">
                <i class="mr-1"></i>
                <span></span>
            </a>
        </template>

        <template id="tpl-empty">
            <div class="text-center text-gray-500 mt-10 fade-in select-none">
                <i class="fa-solid fa-filter-circle-xmark text-4xl mb-3 opacity-50"></i>
                <p>Sonuç bulunamadı.</p>
            </div>
        </template>

        <template id="tpl-menu-item">
            <a target="_blank" rel="noopener noreferrer"
                class="flex items-center p-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 transition duration-150 border-b border-gray-100 dark:border-neutral-800 last:border-b-0 group">
                <i class="fa-solid mr-3 text-emerald-500 w-5 text-center group-hover:scale-110 transition-transform"
                    data-slot="icon"></i>
                <span data-slot="text"></span>
            </a>
        </template>

        <!-- Header -->
        <header
            class="bg-emerald-700 dark:bg-emerald-900 border-b border-transparent dark:border-emerald-800 text-white px-4 pb-2 shadow-lg transition-colors duration-300">
            <div class="max-w-md mx-auto relative pt-2">
                <button id="btn-theme-toggle"
                    class="absolute right-0 top-1.5 z-[101] bg-emerald-600 dark:bg-emerald-800 p-2 rounded-full w-9 h-9 flex items-center justify-center hover:bg-emerald-500 transition shadow-md border border-emerald-500 dark:border-emerald-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-400 focus:ring-offset-emerald-800">
                    <i class="fa-solid fa-moon text-white text-xs pointer-events-none"></i>
                </button>

                <div class="mb-2 select-none">
                    <h1 class="text-xl font-bold mb-0.5 flex items-center">
                        <i class="fa-solid fa-book-open mr-2"></i>Ders Programı
                    </h1>
                    <p class="text-emerald-100 text-[11px] opacity-90">Ders notları ve tilavet arşivi</p>
                </div>

                <div class="relative mb-2 group">
                    <input type="text" id="input-search" placeholder="Ders, hoca veya konu ara..."
                        class="w-full p-2 pl-9 rounded-lg text-sm text-gray-800 dark:text-gray-100 bg-white dark:bg-black border-0 focus:outline-none focus:ring-2 focus:ring-emerald-400 shadow-sm placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-300 group-hover:shadow-md dark:border dark:border-neutral-800"
                        autocomplete="off" enterkeyhint="search">
                    <i
                        class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 dark:text-gray-500 text-sm pointer-events-none"></i>
                </div>

                <div class="flex flex-col gap-2 relative z-10">
                    <div class="relative w-full">
                        <button id="btn-quran-menu"
                            class="w-full p-2 flex justify-between items-center rounded-lg text-white bg-emerald-600 dark:bg-emerald-800 hover:bg-emerald-500 dark:hover:bg-emerald-700 transition duration-200 shadow-md text-sm border border-emerald-500/30 focus:outline-none focus:ring-2 focus:ring-emerald-400 active:scale-[0.99]"
                            aria-haspopup="true" aria-expanded="false">
                            <span class="font-semibold flex items-center pointer-events-none">
                                <i class="fa-solid fa-layer-group mr-2"></i>Kur'an Kaynakları
                            </span>
                            <i class="fa-solid fa-chevron-down smooth-transition pointer-events-none"></i>
                        </button>
                        <div id="menu-quran"
                            class="absolute w-full mt-1 bg-white dark:bg-black rounded-lg shadow-xl overflow-hidden hidden border border-gray-200 dark:border-neutral-800 max-h-60 overflow-y-auto z-20 transition-all origin-top transform scale-95 opacity-0">
                        </div>
                    </div>

                    <nav class="flex gap-2 items-stretch h-9">
                        <a href="https://docs.google.com/spreadsheets/d/1VwpLqO34r9qBZU03h130lqtHJoHRebMtF-sS6ex2PHE/edit?gid=479177060"
                            target="_blank" rel="noopener noreferrer"
                            class="flex-1 flex justify-center items-center rounded-lg text-emerald-900 bg-emerald-100 hover:bg-emerald-200 border border-emerald-300 transition duration-200 shadow-md text-xs font-bold text-center h-full hover:-translate-y-0.5 active:scale-95">
                            <i class="fa-solid fa-table mr-2 text-emerald-700"></i>
                            Ders Tablosu
                        </a>
                        <button id="btn-open-quran"
                            class="flex-1 flex justify-center items-center rounded-lg text-amber-900 bg-amber-100 hover:bg-amber-200 border border-amber-300 transition duration-200 shadow-md text-xs font-bold text-center h-full hover:-translate-y-0.5 active:scale-95">
                            <i class="fa-solid fa-book-quran mr-2 text-amber-700"></i>
                            Kur'an Oku
                        </button>
                    </nav>
                </div>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 w-full flex-grow relative" id="main-content" role="main"></main>

        <footer
            class="text-center text-gray-500 dark:text-gray-400 text-sm py-8 bg-gray-50 dark:bg-black border-t border-gray-200 dark:border-neutral-800 pb-safe mt-auto">
            <div class="max-w-md mx-auto px-4">
                <div class="mb-4">
                    <p class="text-[10px] font-bold uppercase tracking-wider mb-2 text-gray-400 dark:text-slate-500">İletişim & Öneri</p>
                    <a href="mailto:biz2004571@gmail.com"
                        class="inline-flex items-center gap-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-neutral-700 px-4 py-2 rounded-full shadow-sm hover:shadow-md transition text-emerald-600 dark:text-emerald-400 hover:bg-emerald-50 dark:hover:bg-gray-700 text-xs font-medium group">
                        <i class="fa-solid fa-envelope group-hover:scale-110 transition-transform"></i>
                        biz2004571@gmail.com
                    </a>
                </div>
                <p class="text-[10px] opacity-60">&copy; 2025 - 2032 Ders Arşivi</p>
            </div>
        </footer>
    </div>

    <!-- ========================================== -->
    <!-- QURAN APP CONTAINER (React Mount)          -->
    <!-- ========================================== -->
    <div id="quran-root"
        class="hidden fixed inset-0 z-[200] bg-gray-50 dark:bg-black w-full h-full overflow-hidden flex flex-col transition-colors duration-300">
    </div>

    <!-- Vite-bundled entry: schedule + quran + service worker -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
