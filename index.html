<!DOCTYPE html>
<html lang="tr" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Kuran okuma, dinleme, arama ve tefekkür uygulaması. Türkçe meal, tefsir ve sesli tilavet.">
    <meta name="theme-color" content="#047857">
    <meta name="color-scheme" content="light dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="Kuran Talebesi">
    <meta name="format-detection" content="telephone=no">
    <title>Kuran Talebesi</title>

    <!-- PWA Settings -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-title" content="Kuran Talebesi">
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Apply theme before first paint to prevent FOUC -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                var sys = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (t === 'dark' || (!t && sys)) document.documentElement.classList.add('dark');
            } catch (e) { /* ignore */ }
        })();
    </script>

</head>

<body class="transition-colors duration-300 flex flex-col">

    <!-- ========================================== -->
    <!-- QURAN APP CONTAINER (React Mount)          -->
    <!-- ========================================== -->
    <div id="quran-root"
        class="fixed inset-0 z-[200] bg-gray-50 dark:bg-black w-full h-full overflow-hidden flex flex-col transition-colors duration-300">
    </div>

    <!-- Vite-bundled entry: schedule + quran + service worker -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
