                            <div className="flex gap-2 items-center mb-2">
                                <form onSubmit={(e) => { e.preventDefault(); handleSearch(searchQuery); }} className="relative group flex-1">
                                    <input type="text" placeholder="Ara (Örn: namaz, bakara)..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} aria-label="Ayet veya sure ara" className="w-full p-2 pl-9 pr-8 rounded-lg text-sm text-gray-800 dark:bg-black dark:text-white border-0 focus:ring-2 focus:ring-emerald-400 shadow-sm dark:border dark:border-neutral-700" />
                                    <button type="submit" aria-label="Ara" className="absolute left-0 top-0 h-full w-10 flex items-center justify-center text-gray-400 hover:text-emerald-500"><i className="fa-solid fa-search text-sm"></i></button>
                                    {searchQuery && <button type="button" aria-label="Aramayı temizle" onClick={() => { setSearchQuery(''); setRawMatches([]); setDetailedResults([]); setViewMode('reader'); }} className="absolute right-0 top-0 h-full w-8 flex items-center justify-center text-gray-400 hover:text-red-500"><i className="fa-solid fa-xmark text-sm"></i></button>}
                                </form>
                            </div>
                            {/* Navigation Tabs */}
                            <div className="flex gap-1 mt-2 mb-1">
                                <button
                                    onClick={() => setViewMode('reader')}
                                    className={`flex-1 py-1.5 px-2 rounded-lg text-xs font-medium transition-colors flex items-center justify-center gap-1 ${viewMode === 'reader' ? 'bg-white text-emerald-800 shadow-sm' : 'text-emerald-100 hover:bg-emerald-600'}`}
                                >
                                    <i className="fa-solid fa-book-open text-[10px]"></i> Kur'an
                                </button>
                                <button
                                    onClick={() => { if (searchQuery) { handleSearch(searchQuery); } setViewMode('search'); }}
                                    className={`flex-1 py-1.5 px-2 rounded-lg text-xs font-medium transition-colors flex items-center justify-center gap-1 ${viewMode === 'search' ? 'bg-white text-emerald-800 shadow-sm' : 'text-emerald-100 hover:bg-emerald-600'}`}
                                >
                                    <i className="fa-solid fa-magnifying-glass text-[10px]"></i> Arama
                                </button>
                                <button
                                    onClick={() => setViewMode('playlists_list')}
                                    className={`flex-1 py-1.5 px-2 rounded-lg text-xs font-medium transition-colors flex items-center justify-center gap-1 ${viewMode === 'playlists_list' || viewMode === 'playlist_view' ? 'bg-white text-emerald-800 shadow-sm' : 'text-emerald-100 hover:bg-emerald-600'}`}
                                >
                                    <i className="fa-solid fa-layer-group text-[10px]"></i> Listelerim
                                </button>
                            </div>

                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-1">
                                    <button title="Notları yedek olarak indir" onClick={() => {
                                        const notes = {};
                                        for (let i = 0; i < localStorage.length; i++) {
                                            const key = localStorage.key(i);
                                            if (key && key.startsWith('quran_note_')) notes[key] = localStorage.getItem(key);
                                        }
                                        if (Object.keys(notes).length === 0) { showToast('Kaydedilmiş not yok.'); return; }
                                        const blob = new Blob([JSON.stringify(notes, null, 2)], { type: 'application/json' });
                                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                                        a.download = `kuran-notlar-${new Date().toISOString().slice(0,10)}.json`; a.click();
                                        showToast(`${Object.keys(notes).length} not yedeklendi.`);
                                    }} className="bg-emerald-800 text-emerald-200 hover:bg-emerald-600 text-[10px] px-2 py-1 rounded border border-emerald-600/30 flex items-center gap-1">
                                        <i className="fa-solid fa-arrow-up-from-bracket text-[9px]"></i>
                                        <span>Notları Yedekle</span>
                                    </button>
                                    <label title="Daha önce yedeklediğin notları geri yükle" className="bg-emerald-800 text-emerald-200 hover:bg-emerald-600 text-[10px] px-2 py-1 rounded border border-emerald-600/30 flex items-center gap-1 cursor-pointer">
                                        <i className="fa-solid fa-arrow-down-to-bracket text-[9px]"></i>
                                        <span>Yedek Yükle</span>
                                        <input type="file" accept=".json" className="hidden" onChange={(e) => {
                                            const file = e.target.files?.[0]; if (!file) return;
                                            const reader = new FileReader();
                                            reader.onload = (ev) => {
                                                try {
                                                    const data = JSON.parse(ev.target.result);
                                                    let count = 0;
                                                    Object.entries(data).forEach(([k, v]) => { if (k.startsWith('quran_note_')) { localStorage.setItem(k, v); count++; } });
                                                    showToast(`${count} not yedeğinden yüklendi. Sayfayı yenileyin.`);
                                                } catch { showToast('Geçersiz dosya.'); }
                                            };
                                            reader.readAsText(file);
                                            e.target.value = '';
                                        }} />
                                    </label>
                                </div>
                                <div className="flex items-center bg-emerald-800 rounded-lg px-2 py-1 gap-2 border border-emerald-600/30">
                                    <i className="fa-solid fa-font text-emerald-200 ml-1 text-[10px]"></i>
                                    <button onClick={() => setFontSize(prev => Math.max(14, prev - 2))} aria-label="Yazı boyutunu küçült" className="w-6 h-6 flex items-center justify-center bg-emerald-600 rounded-md text-xs hover:bg-emerald-500 font-bold">-</button>
                                    <span className="text-xs font-mono w-4 text-center" aria-label={`Yazı boyutu: ${fontSize}`}>{fontSize}</span>
                                    <button onClick={() => setFontSize(prev => Math.min(32, prev + 2))} aria-label="Yazı boyutunu büyüt" className="w-6 h-6 flex items-center justify-center bg-emerald-600 rounded-md text-xs hover:bg-emerald-500 font-bold">+</button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden relative">
                        <SurahList />
                        <MainContent />
                        <PlayerBar />
                    </div>

                    {/* Bulk Actions Floating Bar */}
                    {selectedAyahs.length > 0 && (
                        <div className="fixed bottom-20 left-1/2 transform -translate-x-1/2 z-50 bg-emerald-800 text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-4 animate-bounce-in">
                            <span className="font-bold text-sm whitespace-nowrap">{selectedAyahs.length} Seçildi</span>
                            <div className="h-4 w-px bg-white/30"></div>
                            <button onClick={() => setPlaylistModal(true)} className="font-bold text-sm hover:text-emerald-200 flex items-center gap-2"><i className="fa-solid fa-folder-plus"></i> Listeye Ekle</button>
                            <button onClick={() => setSelectedAyahs([])} className="w-6 h-6 flex items-center justify-center rounded-full bg-black/20 hover:bg-black/40 text-xs ml-2"><i className="fa-solid fa-xmark"></i></button>
                        </div>
                    )}

                    {/* Bulk Add Modal */}
                    {playlistModal && (
                        <div className="fixed inset-0 z-[100] bg-black/50 flex items-center justify-center p-4">
                            <div className="bg-white dark:bg-black dark:border dark:border-neutral-800 p-6 rounded-xl w-full max-w-sm">
                                <h3 className="font-bold mb-4 dark:text-white">Seçilenleri Listeye Ekle</h3>
                                <input type="text" placeholder="Yeni Liste Adı" value={newListName} onChange={(e) => setNewListName(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') handleBulkAdd(); }} className="w-full p-2 border rounded mb-4 dark:bg-gray-900 dark:border-gray-700 dark:text-white" />
                                <div className="flex justify-end gap-2">
                                    <button onClick={() => { setPlaylistModal(false); setNewListName(""); }} className="px-4 py-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700 rounded">İptal</button>
                                    <button onClick={handleBulkAdd} className="px-4 py-2 bg-emerald-600 text-white rounded hover:bg-emerald-700">Oluştur ve Ekle</button>
                                </div>
                                <div className="mt-4 pt-4 border-t dark:border-gray-700">
                                    <p className="text-xs text-gray-500 mb-2">Veya mevcut listeye ekle:</p>
                                    <div className="flex flex-col gap-2 max-h-40 overflow-y-auto">
                                        {playlists.map(p => (
                                            <button key={p.id} onClick={() => {
                                                const updated = { ...p, items: [...p.items, ...selectedAyahs.filter(s => !p.items.some(pi => pi.number === s.number))] };
                                                setPlaylists(prev => prev.map(pr => pr.id === p.id ? updated : pr));
                                                showToast(`${selectedAyahs.filter(s => !p.items.some(pi => pi.number === s.number)).length} ayet '${p.name}' listesine eklendi.`);
                                                setSelectedAyahs([]);
                                                setPlaylistModal(false);
                                            }} className="text-left text-sm p-2 bg-gray-50 dark:bg-gray-700 rounded hover:bg-emerald-50 dark:hover:bg-emerald-900/20">{p.name}</button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="fixed top-20 left-1/2 transform -translate-x-1/2 z-[150] bg-gray-900/90 dark:bg-emerald-900/90 text-white px-4 py-2 rounded-full shadow-lg text-sm flex items-center gap-2 animate-bounce-in border border-gray-700 dark:border-emerald-700 backdrop-blur-sm">
                            <i className="fa-solid fa-circle-check text-emerald-400"></i>
                            {toastMessage}
                        </div>
                    )}
                </div>
            );
        };

        const QuranApp = () => {
            return (
                <QuranProvider>
                    <AppContainer />
                </QuranProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('quran-root'));
        root.render(<QuranApp />);
    </script>

    <script>
        // Service Worker Registration + Update Prompt
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => {
                    reg.addEventListener('updatefound', () => {
                        const newWorker = reg.installing;
                        if (!newWorker) return;
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // New version ready — show update banner
                                const banner = document.createElement('div');
                                banner.id = 'sw-update-banner';
                                banner.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:#047857;color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;font-family:Inter,sans-serif;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.25);white-space:nowrap;';
                                banner.innerHTML = '<span>Yeni sürüm hazır!</span><button id="sw-update-btn" style="background:#fff;color:#047857;border:none;border-radius:99px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer;">Güncelle</button>';
                                document.body.appendChild(banner);
                                document.getElementById('sw-update-btn').addEventListener('click', () => {
                                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                                    banner.remove();
                                    window.location.reload();
                                });
                            }
                        });
                    });
                }).catch(err => console.warn('[SW] Registration failed:', err));

                // If a new SW just took over, reload once cleanly
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) { refreshing = true; window.location.reload(); }
                });
            });
        }
    </script>
</body>
</html>
